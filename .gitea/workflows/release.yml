name: Release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nicoverbruggen/fntbld-oci:latest

    steps:
      # Full history, so the branch check below can resolve origin/main.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Tags on main are stable; tags anywhere else (e.g. trunk) ship as
      # pre-releases.
      - name: Determine release type
        id: release_type
        run: |
          # The workspace is owned by the runner user but this job runs as root
          # inside the container, so git refuses the repo as "dubious ownership"
          # and every command fails. Trust it explicitly.
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          if ! git rev-parse --verify -q origin/main >/dev/null; then
            echo "origin/main not found; cannot tell stable from pre-release" >&2
            exit 1
          fi
          if git merge-base --is-ancestor "${{ inputs.version || gitea.ref_name }}" origin/main; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "${{ inputs.version || gitea.ref_name }} is on main: stable release"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "${{ inputs.version || gitea.ref_name }} is not on main: pre-release"
          fi

      # The collection's own version, which is independent of the date-based tag.
      - name: Read version
        id: version
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if [ -z "$version" ]; then
            echo "VERSION is empty" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "version: $version"

      - name: Build release artifacts
        run: python3 build.py --out-dir out

      - name: Create zip files
        run: |
          cd out/kobo/core    && zip -j /tmp/kobo-core-fonts.zip *.ttf
          cd $GITHUB_WORKSPACE/out/kobo/extra   && zip -j /tmp/kobo-extra-fonts.zip *.ttf
          cd $GITHUB_WORKSPACE/out/sources/core  && zip -j /tmp/other-core-fonts.zip *.ttf
          cd $GITHUB_WORKSPACE/out/sources/extra && zip -j /tmp/other-extra-fonts.zip *.ttf
          cd $GITHUB_WORKSPACE/out/relaxed/core  && zip -j /tmp/relaxed-core-fonts.zip *.ttf
          cd $GITHUB_WORKSPACE/out/relaxed/extra && zip -j /tmp/relaxed-extra-fonts.zip *.ttf

      - name: Generate manifest
        run: python3 tools/generate_manifest.py --host git.nicoverbruggen.be --tag ${{ inputs.version || gitea.ref_name }} --archive-dir /tmp --out /tmp/manifest.json

      - name: Create release
        uses: akkuman/gitea-release-action@v1
        with:
          token: ${{ secrets.GITEA_TOKEN }}
          draft: false
          prerelease: ${{ steps.release_type.outputs.prerelease }}
          tag_name: ${{ inputs.version || gitea.ref_name }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ### Which fonts should I download?

            - **If you are using a Kobo device**, download the [KF Core fonts](https://git.nicoverbruggen.be/fonts/ebook-fonts/releases/download/${{ inputs.version || gitea.ref_name }}/kobo-core-fonts.zip) and the [KF Extra fonts](https://git.nicoverbruggen.be/fonts/ebook-fonts/releases/download/${{ inputs.version || gitea.ref_name }}/kobo-extra-fonts.zip). These are altered for optimal kerning on the `kepub` renderer.
            - **If you are using a Kindle or another e-reader**, download the [NV Core fonts](https://git.nicoverbruggen.be/fonts/ebook-fonts/releases/download/${{ inputs.version || gitea.ref_name }}/other-core-fonts.zip) and the [NV Extra fonts](https://git.nicoverbruggen.be/fonts/ebook-fonts/releases/download/${{ inputs.version || gitea.ref_name }}/other-extra-fonts.zip).
            - **If you are using KOReader**, download the [Relaxed Core fonts](https://git.nicoverbruggen.be/fonts/ebook-fonts/releases/download/${{ inputs.version || gitea.ref_name }}/relaxed-core-fonts.zip) and the [Relaxed Extra fonts](https://git.nicoverbruggen.be/fonts/ebook-fonts/releases/download/${{ inputs.version || gitea.ref_name }}/relaxed-extra-fonts.zip). Every family, rebuilt with looser line spacing.

            ### Learn more

            For more information about the fonts, screenshots and how to install them, please consult the README. The FAQ also includes an entry on how to enable ligatures on Kobo devices, which is highly recommended.

            ### License

            Due to the nature of the OFL/libre licensing of the fonts, you may find these or the original fonts also excellent for embedding in your digital books in lieu of a commercial font, which may be prohibitively expensive to license if you wish to distribute your own epub files.

            More info about licensing information can be found in the FAQ, which is part of the README.
          files: |
            /tmp/kobo-core-fonts.zip
            /tmp/kobo-extra-fonts.zip
            /tmp/other-core-fonts.zip
            /tmp/other-extra-fonts.zip
            /tmp/relaxed-core-fonts.zip
            /tmp/relaxed-extra-fonts.zip
            /tmp/manifest.json
